name: Tests

on:
  pull_request:
    branches: [ main, renovate/all-dependencies ]

jobs:
  test:
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.4'
    
    - name: Install dependencies
      run: |
        # Install test requirements first (pytest==8.4.2)
        pip install -r src/tests/requirements.txt
        # Strip pytest packages from backend requirements (they conflict with pytest==8.4.2;
        # testing deps belong in test requirements, not production backend requirements)
        grep -v -E '^pytest' src/backend/requirements.txt > /tmp/backend-reqs.txt
        pip install -r /tmp/backend-reqs.txt
        pip install -r src/frontend/requirements.txt
    
    - name: Install Playwright browsers
      run: playwright install --with-deps chromium
    
    - name: Start backend API
      run: |
        pip install -r src/backend/requirements.txt
        nohup uvicorn src.backend.api.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
        echo $! > backend.pid
        sleep 5
    
    - name: Start frontend
      run: |
        pip install -r src/frontend/requirements.txt
        cd src/frontend
        nohup streamlit run app.py --server.port 8501 --server.headless true > ../../frontend.log 2>&1 &
        echo $! > ../../frontend.pid
        sleep 10
      env:
        API_BASE_URL: http://localhost:8000
    
    - name: Verify services are running
      run: |
        curl -f http://localhost:8000/health || (echo "Backend health check failed" && cat backend.log && exit 1)
        curl -f http://localhost:8501 || (echo "Frontend health check failed" && cat frontend.log && exit 1)
        echo "Both services are running"
    
    - name: Run tests
      run: |
        export PYTHONPATH="$GITHUB_WORKSPACE"
        pytest -v --tb=short
    
    - name: Print logs on failure
      if: failure()
      run: |
        echo "=== Backend logs ==="
        cat backend.log || echo "No backend log"
        echo "=== Frontend logs ==="
        cat frontend.log || echo "No frontend log"
    
    - name: Cleanup
      if: always()
      run: |
        if [ -f backend.pid ]; then kill $(cat backend.pid) || true; fi
        if [ -f frontend.pid ]; then kill $(cat frontend.pid) || true; fi
